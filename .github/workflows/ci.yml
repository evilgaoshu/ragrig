name: RAGRig CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Change detection ───────────────────────────────────────────────────────
  # Tells downstream jobs which areas of the repo changed.
  # On push-to-main we always treat everything as changed so no check is skipped.
  changes:
    name: RAGRig CI / detect-changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.detect.outputs.backend }}
      deps: ${{ steps.detect.outputs.deps }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed paths
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
            echo "deps=true"    >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          echo "Changed files:"
          echo "$CHANGED"
          if echo "$CHANGED" | grep -qE '^(src/|tests/|Makefile|pyproject\.toml|uv\.lock|scripts/|migrations/)'; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -qE '^(pyproject\.toml|uv\.lock)'; then
            echo "deps=true" >> "$GITHUB_OUTPUT"
          else
            echo "deps=false" >> "$GITHUB_OUTPUT"
          fi

  # ── Required checks ────────────────────────────────────────────────────────
  lint:
    name: RAGRig CI / lint
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Check formatting
        run: uvx ruff format --check .

      - name: Lint
        run: uvx ruff check .

  test:
    name: RAGRig CI / test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Test fast
        run: make test-fast

      - name: Web smoke
        run: make web-check

  coverage:
    name: RAGRig CI / coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Coverage
        run: make coverage

      - name: Generate sanitizer coverage summary
        run: make sanitizer-coverage-summary

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-json
          path: coverage.json

      - name: Upload sanitizer coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-coverage-summary
          path: docs/operations/artifacts/sanitizer-coverage-summary.json

      - name: Generate latest evaluation report
        run: uv run python -m scripts.eval_local --ephemeral-sqlite --output evaluation_runs/latest-ci-report.json || true
        continue-on-error: true

      - name: Upload evaluation report artifact
        uses: actions/upload-artifact@v7
        with:
          name: evaluation-report-latest
          path: evaluation_runs/latest-ci-report.json
        continue-on-error: true

  db-smoke:
    name: RAGRig CI / db-smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ragrig
          POSTGRES_PASSWORD: ragrig_dev
          POSTGRES_DB: ragrig
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Migrate up, check, down, up, check
        run: |
          make migrate && make db-check && make migrate-down && make migrate && make db-check
        env:
          DATABASE_URL: postgresql://ragrig:ragrig_dev@localhost:5432/ragrig

  smoke:
    name: RAGRig CI / smoke
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Cost & latency check
        run: make cost-latency-check

      - name: Knowledge map check
        run: make knowledge-map-check

      - name: Upload smoke artifacts
        uses: actions/upload-artifact@v7
        with:
          name: smoke-artifacts
          path: |
            docs/operations/artifacts/cost-latency-check.json
            docs/operations/artifacts/knowledge-map-check.json

  # Docker build always runs (required check) but skips the expensive build
  # steps when only non-image files changed (docs, frontend without Dockerfile).
  docker-build:
    name: RAGRig CI / docker-build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect if Docker build needed
        id: docker_needed
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.sha }}"
          CHANGED=$(git diff --name-only "$BASE" "$HEAD")
          if echo "$CHANGED" | grep -qE '^(Dockerfile|pyproject\.toml|uv\.lock|src/)'; then
            echo "needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "needed=false" >> "$GITHUB_OUTPUT"
            echo "Docker build skipped — no image-relevant changes"
          fi

      - name: Build Docker image
        if: steps.docker_needed.outputs.needed == 'true'
        run: docker build -t ragrig:ci .

      - name: Start container
        if: steps.docker_needed.outputs.needed == 'true'
        run: |
          docker run -d \
            --name ragrig-ci \
            -p 8099:8000 \
            -e DATABASE_URL=postgresql://ci:ci@localhost:5432/ci \
            ragrig:ci

      - name: Wait for app to respond
        if: steps.docker_needed.outputs.needed == 'true'
        run: |
          for i in $(seq 1 15); do
            if curl -sf http://localhost:8099/health > /dev/null 2>&1; then
              echo "App responded after ${i} attempts"
              break
            fi
            sleep 2
          done

      - name: Verify health endpoint returns app:ok
        if: steps.docker_needed.outputs.needed == 'true'
        run: |
          response=$(curl -s http://localhost:8099/health)
          echo "$response"
          echo "$response" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d.get('app') == 'ok', f'expected app=ok, got: {d}'
          print('health check passed: app=ok')
          "

      - name: Stop container
        if: always() && steps.docker_needed.outputs.needed == 'true'
        run: docker rm -f ragrig-ci || true

  frontend:
    name: RAGRig CI / frontend
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint
        run: npm run lint
        working-directory: frontend

      - name: Audit (high+critical only)
        run: npm audit --audit-level=high
        working-directory: frontend

      - name: Build (tsc + vite)
        run: npm run build
        working-directory: frontend

  # ── Optional checks (skip when irrelevant) ────────────────────────────────
  # These are not required branch-protection checks; they can be skipped
  # safely on PRs that don't touch the relevant areas.

  # Sanitizer coverage drift only matters when Python source or tests change.
  drift-diff:
    name: RAGRig CI / drift-diff
    needs: [changes]
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (base)
        run: cd base && uv sync --dev --frozen

      - name: Generate base sanitizer coverage summary
        run: cd base && uv run python -m scripts.sanitizer_coverage --output ../base-summary.json

      - name: Sync dependencies (head)
        run: cd head && uv sync --dev --frozen

      - name: Generate head sanitizer coverage summary
        run: cd head && uv run python -m scripts.sanitizer_coverage --output ../head-summary.json

      - name: Compare sanitizer coverage summaries
        run: |
          cd head
          uv run python -m scripts.sanitizer_drift_diff \
            --base ../base-summary.json \
            --head ../head-summary.json \
            --output docs/operations/artifacts/sanitizer-drift-diff.json \
            --markdown-output docs/operations/artifacts/sanitizer-drift-diff.md \
            --format both

      - name: Upload drift diff artifact
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-drift-diff
          path: head/docs/operations/artifacts/sanitizer-drift-diff.*

      - name: Post PR comment (if permission allows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pulls/${{ github.event.number }}" >/dev/null 2>&1; then
            gh pr comment "${{ github.event.number }}" \
              --body-file head/docs/operations/artifacts/sanitizer-drift-diff.md || true
          fi
        continue-on-error: true

      - name: Write job summary (fallback)
        if: always()
        run: |
          echo "## Sanitizer Golden Drift Diff" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f head/docs/operations/artifacts/sanitizer-drift-diff.md ]; then
            cat head/docs/operations/artifacts/sanitizer-drift-diff.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Drift diff artifact not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Generate drift history
        run: |
          cd head
          uv run python -m scripts.sanitizer_drift_history \
            --artifacts-dir docs/operations/artifacts \
            --output docs/operations/artifacts/sanitizer-drift-history.json \
            --markdown-output docs/operations/artifacts/sanitizer-drift-history.md \
            --stdout || true

      - name: Generate drift history summary
        run: |
          cd head
          uv run python -m scripts.sanitizer_drift_history_summary \
            --history docs/operations/artifacts/sanitizer-drift-history.json \
            --output docs/operations/artifacts/sanitizer-drift-history-summary.md \
            --json \
            --stdout || true
        continue-on-error: true

      - name: Upload drift history artifact
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-drift-history
          path: head/docs/operations/artifacts/sanitizer-drift-history.*

      - name: Upload drift history summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-drift-history-summary
          path: head/docs/operations/artifacts/sanitizer-drift-history-summary.*

  # Supply-chain audit is only meaningful when dependencies change.
  supply-chain:
    name: RAGRig CI / supply-chain
    needs: [changes]
    if: needs.changes.outputs.deps == 'true' || github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Audit
        run: make audit

      - name: Licenses
        run: make licenses

      - name: Upload pip-audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-json
          path: docs/operations/artifacts/pip-audit.json

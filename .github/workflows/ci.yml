name: RAGRig CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  baseline:
    name: baseline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: make test

      - name: Web check
        run: make web-check

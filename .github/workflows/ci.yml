name: RAGRig CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"
      - "LICENSE"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: RAGRig CI / lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Check formatting
        run: uvx ruff format --check .

      - name: Lint
        run: uvx ruff check .

  test:
    name: RAGRig CI / test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Test fast
        run: make test-fast

  coverage:
    name: RAGRig CI / coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Coverage
        run: make coverage

      - name: Generate sanitizer coverage summary
        run: make sanitizer-coverage-summary

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-json
          path: coverage.json

      - name: Upload sanitizer coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-coverage-summary
          path: docs/operations/artifacts/sanitizer-coverage-summary.json

      - name: Generate latest evaluation report
        run: uv run python -m scripts.eval_local --ephemeral-sqlite --output evaluation_runs/latest-ci-report.json || true
        continue-on-error: true

      - name: Upload evaluation report artifact
        uses: actions/upload-artifact@v7
        with:
          name: evaluation-report-latest
          path: evaluation_runs/latest-ci-report.json
        continue-on-error: true

  benchmark-guard:
    name: RAGRig CI / benchmark-guard
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Compare retrieval benchmark against baseline
        run: |
          set -o pipefail
          mkdir -p docs/operations/artifacts
          make retrieval-benchmark-compare 2>&1 | tee docs/operations/artifacts/retrieval-benchmark-compare.log

      - name: Generate retrieval benchmark integrity artifact
        run: make retrieval-benchmark-integrity-artifact

      - name: Generate retrieval benchmark integrity summary
        run: make retrieval-benchmark-integrity-summary

      - name: Upload retrieval benchmark guard artifacts
        uses: actions/upload-artifact@v7
        with:
          name: retrieval-benchmark-guard
          path: |
            docs/operations/artifacts/retrieval-benchmark-compare.log
            docs/operations/artifacts/retrieval-benchmark-integrity.json
            docs/operations/artifacts/retrieval-benchmark-integrity_summary.json
            docs/operations/artifacts/retrieval-benchmark-integrity_summary.md

      - name: Write retrieval benchmark guard summary
        if: always()
        run: |
          echo "## Retrieval Benchmark Guard" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Compare" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          if [ -f docs/operations/artifacts/retrieval-benchmark-compare.log ]; then
            cat docs/operations/artifacts/retrieval-benchmark-compare.log >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Compare log not generated." >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "### Integrity" >> "$GITHUB_STEP_SUMMARY"
          if [ -f docs/operations/artifacts/retrieval-benchmark-integrity_summary.md ]; then
            cat docs/operations/artifacts/retrieval-benchmark-integrity_summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Integrity summary not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

  db-smoke:
    name: RAGRig CI / db-smoke
    runs-on: ubuntu-latest

    services:
      db:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ragrig
          POSTGRES_PASSWORD: ragrig_dev
          POSTGRES_DB: ragrig
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Migrate up, check, down, up, check
        run: |
          make migrate && make db-check && make migrate-down && make migrate && make db-check
        env:
          DATABASE_URL: postgresql://ragrig:ragrig_dev@localhost:5432/ragrig

  web-smoke:
    name: RAGRig CI / web-smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Web check
        run: make web-check

  docker-build:
    name: RAGRig CI / docker-build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t ragrig:ci .

  drift-diff:
    name: RAGRig CI / drift-diff
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          path: base

      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          path: head

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies (base)
        run: cd base && uv sync --dev --frozen

      - name: Generate base sanitizer coverage summary
        run: cd base && uv run python -m scripts.sanitizer_coverage --output ../base-summary.json

      - name: Sync dependencies (head)
        run: cd head && uv sync --dev --frozen

      - name: Generate head sanitizer coverage summary
        run: cd head && uv run python -m scripts.sanitizer_coverage --output ../head-summary.json

      - name: Compare sanitizer coverage summaries
        run: |
          cd head
          uv run python -m scripts.sanitizer_drift_diff \
            --base ../base-summary.json \
            --head ../head-summary.json \
            --output docs/operations/artifacts/sanitizer-drift-diff.json \
            --markdown-output docs/operations/artifacts/sanitizer-drift-diff.md \
            --format both

      - name: Upload drift diff artifact
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-drift-diff
          path: head/docs/operations/artifacts/sanitizer-drift-diff.*

      - name: Post PR comment (if permission allows)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${{ github.repository }}/pulls/${{ github.event.number }}" >/dev/null 2>&1; then
            gh pr comment "${{ github.event.number }}" \
              --body-file head/docs/operations/artifacts/sanitizer-drift-diff.md || true
          fi
        continue-on-error: true

      - name: Write job summary (fallback)
        if: always()
        run: |
          echo "## Sanitizer Golden Drift Diff" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f head/docs/operations/artifacts/sanitizer-drift-diff.md ]; then
            cat head/docs/operations/artifacts/sanitizer-drift-diff.md >> "$GITHUB_STEP_SUMMARY"
          else
            echo "Drift diff artifact not generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Generate drift history
        run: |
          cd head
          uv run python -m scripts.sanitizer_drift_history \
            --artifacts-dir docs/operations/artifacts \
            --output docs/operations/artifacts/sanitizer-drift-history.json \
            --markdown-output docs/operations/artifacts/sanitizer-drift-history.md \
            --stdout || true

      - name: Generate drift history summary
        run: |
          cd head
          uv run python -m scripts.sanitizer_drift_history_summary \
            --history docs/operations/artifacts/sanitizer-drift-history.json \
            --output docs/operations/artifacts/sanitizer-drift-history-summary.md \
            --json \
            --stdout || true
        continue-on-error: true

      - name: Upload drift history artifact
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-drift-history
          path: head/docs/operations/artifacts/sanitizer-drift-history.*

      - name: Upload drift history summary artifact
        uses: actions/upload-artifact@v7
        with:
          name: sanitizer-drift-history-summary
          path: head/docs/operations/artifacts/sanitizer-drift-history-summary.*

  supply-chain:
    name: RAGRig CI / supply-chain
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --dev --frozen

      - name: Audit
        run: make audit

      - name: Licenses
        run: make licenses

      - name: Upload pip-audit artifact
        uses: actions/upload-artifact@v7
        with:
          name: pip-audit-json
          path: docs/operations/artifacts/pip-audit.json

  frontend:
    name: RAGRig CI / frontend
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Build (tsc + vite)
        run: npm run build
        working-directory: frontend

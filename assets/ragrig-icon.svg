<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">RAGRig project icon</title>
  <desc id="desc">A rounded square icon with connected source nodes, a central retrieval core, and the letters RAG.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="440" y2="464" gradientUnits="userSpaceOnUse">

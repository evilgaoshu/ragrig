services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ragrig
      POSTGRES_USER: ragrig
      POSTGRES_PASSWORD: ragrig_dev
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragrig -d ragrig"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.14.1
    profiles:
      - qdrant
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles:
      - minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin123}
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  samba:
    image: dperson/samba:latest
    profiles:
      - fileshare-live
    environment:
      USERID: 1000
      GROUPID: 1000
    command: >
      -s "share;/mnt/share;yes;no;yes;all;none"
      -u "testuser;testpass"
      -p
    ports:
      - "${SMB_HOST_PORT:-1445}:445"
    volumes:
      - fileshare_samba_data:/mnt/share

  webdav:
    image: bytemark/webdav:latest
    profiles:
      - fileshare-live
    environment:
      AUTH_TYPE: Basic
      USERNAME: testuser
      PASSWORD: testpass
    ports:
      - "${WEBDAV_HOST_PORT:-8080}:80"
    volumes:
      - fileshare_webdav_data:/var/lib/dav

  sftp:
    image: atmoz/sftp:latest
    profiles:
      - fileshare-live
    command: testuser:testpass:::upload
    ports:
      - "${SFTP_HOST_PORT:-2222}:22"
    volumes:
      - fileshare_sftp_data:/home/testuser/upload

volumes:
  pgdata:
  qdrant_data:
  minio_data:
  fileshare_samba_data:
  fileshare_webdav_data:
  fileshare_sftp_data:

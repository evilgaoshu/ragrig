services:
  app:
    build: .
    env_file:
      - .env
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ragrig
      POSTGRES_USER: ragrig
      POSTGRES_PASSWORD: ragrig_dev
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragrig -d ragrig"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.14.2
    profiles:
      - qdrant
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:

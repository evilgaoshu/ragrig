services:
  app:
    image: ${RAGRIG_IMAGE:-ragrig:local}
    build: .
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      DATABASE_URL: ${RAGRIG_DOCKER_DATABASE_URL:-postgresql://ragrig:ragrig_dev@db:5432/ragrig}
      DB_RUNTIME_HOST: ${RAGRIG_DOCKER_DB_RUNTIME_HOST:-db}
      DB_HOST_PORT: 5432
      VECTOR_BACKEND: ${VECTOR_BACKEND:-pgvector}
      QDRANT_URL: ${QDRANT_URL:-http://qdrant:6333}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}
      RAGRIG_AUTO_MIGRATE: ${RAGRIG_AUTO_MIGRATE:-1}
      RAGRIG_DEMO_SEED: ${RAGRIG_DEMO_SEED:-1}
      RAGRIG_ANSWER_PROVIDER: ${RAGRIG_ANSWER_PROVIDER:-deterministic-local}
      RAGRIG_ANSWER_MODEL: ${RAGRIG_ANSWER_MODEL:-}
      RAGRIG_ANSWER_BASE_URL: ${RAGRIG_ANSWER_BASE_URL:-http://host.docker.internal:11434/v1}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    ports:
      - "${APP_HOST_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ragrig
      POSTGRES_USER: ragrig
      POSTGRES_PASSWORD: ragrig_dev
    ports:
      - "${DB_HOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ragrig -d ragrig"]
      interval: 5s
      timeout: 5s
      retries: 12

  qdrant:
    image: qdrant/qdrant:v1.14.1
    profiles:
      - qdrant
    ports:
      - "${QDRANT_HOST_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    profiles:
      - minio
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: ${AWS_ACCESS_KEY_ID:-minioadmin}
      MINIO_ROOT_PASSWORD: ${AWS_SECRET_ACCESS_KEY:-minioadmin123}
    ports:
      - "${MINIO_API_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data

  samba:
    image: dperson/samba:latest
    profiles:
      - fileshare-live
    environment:
      USERID: 1000
      GROUPID: 1000
    command: >
      -s "share;/mnt/share;yes;no;yes;all;none"
      -u "testuser;testpass"
      -p
    ports:
      - "${SMB_HOST_PORT:-1445}:445"
    volumes:
      - fileshare_samba_data:/mnt/share

  webdav:
    image: bytemark/webdav:latest
    profiles:
      - fileshare-live
    environment:
      AUTH_TYPE: Basic
      USERNAME: testuser
      PASSWORD: testpass
    ports:
      - "${WEBDAV_HOST_PORT:-8080}:80"
    volumes:
      - fileshare_webdav_data:/var/lib/dav

  sftp:
    image: atmoz/sftp:latest
    profiles:
      - fileshare-live
    command: testuser:testpass:::upload
    ports:
      - "${SFTP_HOST_PORT:-2222}:22"
    volumes:
      - fileshare_sftp_data:/home/testuser/upload

volumes:
  pgdata:
  qdrant_data:
  minio_data:
  fileshare_samba_data:
  fileshare_webdav_data:
  fileshare_sftp_data:

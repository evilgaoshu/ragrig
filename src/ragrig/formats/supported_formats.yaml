# RAGRig Supported Formats Registry
#
# This file defines every file format RAGRig knows about.
# The Web Console upload endpoint and the ingestion pipeline
# use this registry to validate incoming files.
#
# Status values:
#   supported - Fully implemented, tested, production-ready
#   preview   - Partially implemented, opt-in, may have limitations
#   planned   - On the roadmap, not yet implemented

- extension: ".md"
  mime_type: "text/markdown"
  display_name: "Markdown (.md)"
  parser_id: "parser.markdown"
  status: "supported"
  max_file_size_mb: 50
  capabilities:
    - parse
    - chunk
    - embed
  limitations: null
  docs_reference: "docs/specs/ragrig-processing-profile-spec.md"

- extension: ".markdown"
  mime_type: "text/markdown"
  display_name: "Markdown (.markdown)"
  parser_id: "parser.markdown"
  status: "supported"
  max_file_size_mb: 50
  capabilities:
    - parse
    - chunk
    - embed
  limitations: null
  docs_reference: "docs/specs/ragrig-processing-profile-spec.md"

- extension: ".txt"
  mime_type: "text/plain"
  display_name: "Plain Text (.txt)"
  parser_id: "parser.text"
  status: "supported"
  max_file_size_mb: 50
  capabilities:
    - parse
    - chunk
    - embed
  limitations: null
  docs_reference: "docs/specs/ragrig-processing-profile-spec.md"

- extension: ".text"
  mime_type: "text/plain"

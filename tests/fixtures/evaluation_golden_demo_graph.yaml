golden_question_set:
  name: "demo-graph"
  description: "External-demo gate covering single-hop facts, multi-document relationships, global synthesis, graph feedback, parser readiness, and role-model operations."
  version: "1.1.0"
  questions:
    - query: "What makes a Local Pilot answer trustworthy?"
      expected_doc_uri: "support-faq.md"
      expected_citation: "A trustworthy Local Pilot answer is grounded."
      expected_answer_keywords:
        - "grounded"
        - "evidence"
        - "citations"
      tags:
        - demo
        - single-hop
        - citation-trust

    - query: "Which workflow steps are visible before trusting the answer?"
      expected_doc_uri: "company-handbook.md"
      expected_citation: "document upload, parsing, chunking, embedding, indexing, retrieval, answer grounding, and citations"
      expected_answer_keywords:
        - "upload"
        - "retrieval"
        - "citations"
      tags:
        - demo
        - single-hop
        - explainability

    - query: "How do the handbook and FAQ together explain grounded citations?"
      expected_answer_keywords:
        - "handbook"
        - "FAQ"
        - "citations"
      expected_relevant_citations:
        - "citation evidence"
        - "evidence chunks"
      tags:
        - demo
        - multi-hop
        - cross-doc
        - graph

    - query: "Summarize the demo's end-to-end RAG workflow."
      expected_answer_keywords:
        - "upload"
        - "index"
        - "retrieve"
        - "grounded"
      tags:
        - demo
        - global
        - synthesis

    - query: "Should missing OpenRouter keys block the local pilot demo?"
      expected_doc_uri: "support-faq.md"
      expected_citation: "missing keys should be reported as optional readiness, not a startup failure"
      expected_answer_keywords:
        - "optional"
        - "local pilot"
      tags:
        - demo
        - conflict-sensitive
        - credentials

    - query: "How does EvidenceBridge connect CompanyHandbook and SupportFAQ for grounded citations?"
      expected_doc_uri: "graph-playbook.md"
      expected_citation: "handbook workflow steps and FAQ evidence chunks must be read together"
      expected_answer_keywords:
        - "handbook"
        - "FAQ"
        - "evidence chunks"
      tags:
        - demo
        - graph
        - multi-hop
        - cross-doc

    - query: "What links PipelineRun and CitationPanel for reviewers?"
      expected_doc_uri: "graph-playbook.md"
      expected_citation: "AtlasRunbook links PipelineRun and CitationPanel"
      expected_answer_keywords:
        - "AtlasRunbook"
        - "PipelineRun"
        - "CitationPanel"
      tags:
        - demo
        - graph
        - traceability

    - query: "Which query mode should show relation paths, matched entities, and boosted chunks?"
      expected_doc_uri: "graph-playbook.md"
      expected_citation: "HybridGraphMode should surface relation paths, matched entities, and boosted chunks"
      expected_answer_keywords:
        - "HybridGraphMode"
        - "relation paths"
        - "boosted chunks"
      tags:
        - demo
        - graph
        - console

    - query: "How should reviewers handle a wrong graph edge?"
      expected_doc_uri: "graph-playbook.md"
      expected_citation: "RelationFeedback lets reviewers mark a wrong edge as incorrect"
      expected_answer_keywords:
        - "RelationFeedback"
        - "wrong edge"
        - "source chunks"
      tags:
        - demo
        - graph
        - feedback

    - query: "Which router separates AdminReviewer and ViewerAnalyst model choices?"
      expected_doc_uri: "graph-playbook.md"
      expected_citation: "RoleModelRouter assigns AdminReviewer to precise-answer models and ViewerAnalyst to economical local models"
      expected_answer_keywords:
        - "RoleModelRouter"
        - "AdminReviewer"
        - "ViewerAnalyst"
      tags:
        - demo
        - role-models
        - cost-latency

    - query: "Which parser bridge uses DoclingAdapter or MinerUAdapter for OCR evidence?"
      expected_doc_uri: "graph-playbook.md"
      expected_citation: "ParserBridge routes scanned PDFs through DoclingAdapter or MinerUAdapter"
      expected_answer_keywords:
        - "ParserBridge"
        - "DoclingAdapter"
        - "MinerUAdapter"
      tags:
        - demo
        - multimodal
        - parser-adapter

    - query: "What should happen to an incorrect graph relation after RelationFeedback?"
      expected_doc_uri: "demo-architecture.md"
      expected_citation: "A relation marked incorrect should be suppressed from graph boosting"
      expected_answer_keywords:
        - "suppressed"
        - "graph boosting"
        - "source chunks"
      tags:
        - demo
        - graph
        - feedback
        - eval

    - query: "Which board compares DenseMode, GraphMode, and HybridGraphMode?"
      expected_doc_uri: "demo-architecture.md"
      expected_citation: "StrategyCompareBoard runs DenseMode, GraphMode, and HybridGraphMode"
      expected_answer_keywords:
        - "StrategyCompareBoard"
        - "DenseMode"
        - "HybridGraphMode"
      tags:
        - demo
        - console
        - strategy-compare

    - query: "Why did IncidentA12 need graph retrieval?"
      expected_doc_uri: "demo-incident.md"
      expected_citation: "HybridGraphMode linked SupportFAQ, CompanyHandbook, and EvidenceBridge"
      expected_answer_keywords:
        - "IncidentA12"
        - "HybridGraphMode"
        - "EvidenceBridge"
      tags:
        - demo
        - graph
        - multi-hop
        - cross-doc

    - query: "Where is role-specific model configuration persisted?"
      expected_doc_uri: "role-parser-ops.md"
      expected_citation: "RoleModelRouter persists role-specific model configuration at the knowledge-base level"
      expected_answer_keywords:
        - "RoleModelRouter"
        - "knowledge-base"
        - "role"
      tags:
        - demo
        - role-models
        - cost-latency

    - query: "What does ParserCorpusGate report for advanced parser coverage?"
      expected_doc_uri: "role-parser-ops.md"
      expected_citation: "ParserCorpusGate reports healthy, degraded, skipped, and failed fixture counts"
      expected_answer_keywords:
        - "ParserCorpusGate"
        - "healthy"
        - "skipped"
      tags:
        - demo
        - multimodal
        - parser-adapter
